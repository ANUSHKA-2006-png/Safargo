apiVersion: v1
kind: ConfigMap
metadata:
  name: safargo-config
  namespace: safargo
data:
  NODE_ENV: production
  PORT: "8080"
  CORS_ORIGIN: https://safargo.local
  REDIS_URL: redis://safargo-redis:6379
  OPENAI_MODEL: gpt-4o-mini
  GEMINI_MODEL: gemini-1.5-flash
  LOG_LEVEL: info
  VITE_API_URL: https://safargo.local/api/v1
