apiVersion: apps/v1
kind: Deployment
metadata:
  name: safargo-backend
  namespace: safargo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safargo-backend
  template:
    metadata:
      labels:
        app: safargo-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/safargo/safargo-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: safargo-config
            - secretRef:
                name: safargo-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: safargo-backend
  namespace: safargo
spec:
  selector:
    app: safargo-backend
  ports:
    - port: 8080
      targetPort: 8080
