services:
  postgres:
    image: postgres:16-alpine
    container_name: safargo-postgres
    environment:
      POSTGRES_DB: safargo
      POSTGRES_USER: safargo
      POSTGRES_PASSWORD: safargo_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safargo -d safargo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: safargo-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safargo-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://safargo:safargo_dev_password@postgres:5432/safargo?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safargo-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
